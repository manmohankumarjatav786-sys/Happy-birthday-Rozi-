<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>For Sona ❤️</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        /* --- PREMIUM CSS STYLING --- */
        :root {
            --bg-dark: #05010a;
            --bg-purple: #2a0845;
            --bg-pink: #641b4d;
            --text-primary: #ffffff;
            --text-gold: #e8c37d;
            --glass-bg: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.08);
            --font-heading: 'Cormorant Garamond', serif;
            --font-body: 'Montserrat', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body, html {
            width: 100%; height: 100%; overflow: hidden;
            background: radial-gradient(circle at center, var(--bg-purple) 0%, var(--bg-dark) 80%, #000 100%);
            font-family: var(--font-body); color: var(--text-primary);
            -webkit-font-smoothing: antialiased;
        }

        .screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            display: flex; justify-content: center; align-items: center;
            transition: opacity 1.5s cubic-bezier(0.25, 1, 0.5, 1), transform 1.5s cubic-bezier(0.25, 1, 0.5, 1);
            z-index: 10; opacity: 0; pointer-events: none; transform: scale(1.05);
        }

        .screen.active { opacity: 1; pointer-events: all; transform: scale(1); }
        .screen.hidden { opacity: 0; pointer-events: none; transform: scale(0.95); }

        #particle-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; pointer-events: none; overflow: hidden; }
        #fireworks-canvas { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; pointer-events: none; }

        .glass-panel {
            background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 24px;
            padding: 40px; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px);
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.5); text-align: center; max-width: 90%; width: 600px; z-index: 20;
        }

        /* Loading */
        .glowing-heart { font-size: 3rem; animation: pulse-glow 1.5s infinite alternate ease-in-out; }
        .loading-text { font-weight: 300; letter-spacing: 2px; font-size: 1rem; animation: fade-pulse 2s infinite; }

        /* Intro */
        .animated-text {
            font-family: var(--font-heading); font-size: 4rem; margin-bottom: 40px;
            background: linear-gradient(45deg, #fff, #ffb6c1); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
        }
        .interactive-heart { width: 120px; height: 120px; cursor: pointer; animation: float 4s ease-in-out infinite; }
        .heart-svg { fill: #ff2a5f; filter: drop-shadow(0 0 15px rgba(255, 42, 95, 0.6)); animation: heartbeat 1.5s infinite; }

        /* Envelope */
        .envelope-wrapper { position: relative; cursor: pointer; z-index: 20; }
        .envelope { position: relative; width: 300px; height: 200px; background: #1a0b2e; border: 1px solid var(--glass-border); box-shadow: 0 10px 30px rgba(0,0,0,0.8); transition: transform 0.5s; }
        .envelope-wrapper:hover .envelope { transform: translateY(-10px); }
        .flap { position: absolute; width: 100%; height: 100%; border-style: solid; border-color: transparent; }
        .bottom-flap { border-width: 100px 150px; border-bottom-color: #24113d; bottom: 0; z-index: 4; }
        .left-flap { border-width: 100px 150px; border-left-color: #1e0c33; left: 0; z-index: 3; }
        .right-flap { border-width: 100px 150px; border-right-color: #1e0c33; right: 0; z-index: 3; }
        .top-flap { border-width: 100px 150px; border-top-color: #2d164d; top: 0; transform-origin: top; transition: transform 1s; z-index: 5; }
        .letter {
            position: absolute; top: 10px; left: 10px; right: 10px; bottom: 10px; background: #fff;
            border-radius: 4px; padding: 20px; color: #333; font-family: var(--font-heading); font-size: 1.2rem;
            text-align: center; display: flex; flex-direction: column; justify-content: center; z-index: 2; transition: transform 1.5s;
        }
        .envelope.open .top-flap { transform: rotateX(180deg); z-index: 1; }
        .envelope.open .letter { transform: translateY(-120px); z-index: 6; }
        .instruction-text { text-align: center; margin-top: 30px; opacity: 0.7; animation: fade-pulse 2s infinite; }

        /* Letter & Typewriter */
        .typewriter-content { font-family: var(--font-heading); font-size: 1.8rem; line-height: 1.6; text-align: left; min-height: 300px; margin-bottom: 20px; }
        .typewriter-content p { margin-bottom: 15px; opacity: 0; transform: translateY(10px); animation: fade-up 0.8s forwards; }
        .cursor { display: inline-block; width: 2px; height: 1.2em; background-color: var(--text-gold); vertical-align: middle; animation: blink 0.8s infinite; }

        /* Proposal */
        .ring-container { position: relative; width: 150px; height: 150px; margin: 0 auto 40px; animation: float 3s infinite; }
        .band { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 80px; height: 80px; border: 8px solid #ffd700; border-radius: 50%; }
        .diamond { position: absolute; top: 15px; left: 50%; transform: translateX(-50%); width: 40px; height: 30px; background: linear-gradient(135deg, #e0f7fa, #fff); clip-path: polygon(20% 0%, 80% 0%, 100% 30%, 50% 100%, 0% 30%); animation: diamond-sparkle 2s infinite alternate; }
        .proposal-text { font-family: var(--font-heading); font-size: 3rem; margin-bottom: 40px; background: linear-gradient(to right, #fff, var(--text-gold)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .button-group { display: flex; justify-content: center; gap: 20px; position: relative; height: 60px; }
        .btn-premium { padding: 15px 40px; border-radius: 30px; border: 1px solid var(--glass-border); font-size: 1.2rem; font-weight: 600; cursor: pointer; transition: all 0.3s; text-transform: uppercase; }
        .btn-yes { background: rgba(255, 42, 95, 0.2); color: #fff; box-shadow: 0 0 20px rgba(255, 42, 95, 0.3); }
        .btn-yes:hover { background: rgba(255, 42, 95, 0.5); transform: scale(1.05); }
        .btn-no { background: rgba(255, 255, 255, 0.05); color: #fff; z-index: 100; }

        /* Celebration */
        .massive-text { font-family: var(--font-heading); font-size: 5rem; text-shadow: 0 0 30px #ff2a5f; animation: pop-in 1s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        .sub-massive-text { font-family: var(--font-heading); font-size: 3rem; color: var(--text-gold); font-style: italic; margin-bottom: 50px; }
        .ending-text { font-size: 1.5rem; font-weight: 300; letter-spacing: 3px; margin-top: 40px; }
        .fade-in-delay { opacity: 0; animation: fade-up 1s forwards 1.5s; }
        .fade-in-delay-long { opacity: 0; animation: fade-up 1s forwards 3s; }

        /* Animations */
        @keyframes pulse-glow { 0% { transform: scale(1); } 100% { transform: scale(1.1); } }
        @keyframes fade-pulse { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }
        @keyframes float { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-15px); } }
        @keyframes heartbeat { 0%, 70% { transform: scale(1); } 14%, 42% { transform: scale(1.1); } }
        @keyframes blink { 50% { opacity: 0; } }
        @keyframes fade-up { to { opacity: 1; transform: translateY(0); } }
        @keyframes diamond-sparkle { 0% { filter: brightness(1); } 100% { filter: brightness(1.3); } }
        @keyframes pop-in { 0% { opacity: 0; transform: scale(0.5); } 100% { opacity: 1; transform: scale(1); } }

        .particle { position: absolute; border-radius: 50%; pointer-events: none; animation: float-up linear infinite; }
        .particle-heart { position: absolute; color: #ff2a5f; font-size: 1.2rem; pointer-events: none; animation: float-up-sway linear infinite; }
        @keyframes float-up { 0% { transform: translateY(100vh); opacity: 0; } 10% { opacity: 1; } 100% { transform: translateY(-100px); opacity: 0; } }
        @keyframes float-up-sway { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 10% { opacity: 0.6; } 100% { transform: translateY(-100px) rotate(-20deg); opacity: 0; } }

        @media (max-width: 768px) {
            .animated-text { font-size: 2.5rem; }
            .glass-panel { padding: 25px; }
            .typewriter-content { font-size: 1.3rem; }
            .proposal-text { font-size: 2rem; }
            .massive-text { font-size: 3rem; }
            .envelope { width: 250px; height: 160px; }
            .bottom-flap, .left-flap, .right-flap, .top-flap { border-width: 80px 125px; }
        }
    </style>
</head>
<body>

    <audio id="bg-music" loop>
        <source src="https://cdn.pixabay.com/download/audio/2022/05/16/audio_097486f059.mp3?filename=romantic-piano-110037.mp3" type="audio/mpeg">
    </audio>

    <div id="particle-container"></div>
    <canvas id="fireworks-canvas"></canvas>

    <!-- 1. Loading Screen -->
    <section id="loading-screen" class="screen active">
        <div class="loading-content">
            <div class="glowing-heart">❤️</div>
            <div class="loading-text">Loading your surprise...</div>
        </div>
    </section>

    <!-- 2. Intro Screen -->
    <section id="intro-screen" class="screen hidden">
        <div class="intro-content">
            <h1 class="animated-text">Touch My Heart ❤️</h1>
            <div id="start-heart" class="interactive-heart">
                <svg viewBox="0 0 32 29.6" class="heart-svg">
                    <path d="M23.6,0c-3.4,0-6.3,2.7-7.6,5.6C14.7,2.7,11.8,0,8.4,0C3.8,0,0,3.8,0,8.4c0,9.4,9.5,11.9,16,21.2
                    c6.1-9.3,16-12.1,16-21.2C32,3.8,28.2,0,23.6,0z"/>
                </svg>
            </div>
        </div>
    </section>

    <!-- 3 & 4. Envelope Screen -->
    <section id="envelope-screen" class="screen hidden">
        <div class="envelope-wrapper">
            <div class="envelope" id="envelope">
                <div class="flap top-flap"></div>
                <div class="flap right-flap"></div>
                <div class="flap left-flap"></div>
                <div class="flap bottom-flap"></div>
                <div class="letter">
                    <p>Dear Sona ❤️</p>
                    <p>Open me...</p>
                </div>
            </div>
            <p class="instruction-text">Tap to open</p>
        </div>
    </section>

    <!-- 5. Love Letter Screen -->
    <section id="letter-screen" class="screen hidden">
        <div class="glass-panel">
            <div id="typewriter-text" class="typewriter-content"></div>
            <button id="btn-continue" class="btn-premium hidden" style="display:none;">Continue</button>
        </div>
    </section>

    <!-- 7. Proposal -->
    <section id="proposal-screen" class="screen hidden">
        <div class="proposal-content glass-panel">
            <div class="ring-container">
                <div class="diamond"></div>
                <div class="band"></div>
            </div>
            <h2 class="proposal-text">Will You Be Mine Forever?</h2>
            <div class="button-group">
                <button id="btn-yes" class="btn-premium btn-yes">YES ❤️</button>
                <button id="btn-no" class="btn-premium btn-no">NO 🙈</button>
            </div>
        </div>
    </section>

    <!-- 8. Celebration -->
    <section id="celebration-screen" class="screen hidden">
        <div class="celebration-content">
            <h1 class="massive-text">I LOVE YOU SONA ❤️</h1>
            <h2 class="sub-massive-text fade-in-delay">Forever & Always</h2>
            <div class="ending-text fade-in-delay-long">Our Story Begins Here ❤️</div>
        </div>
    </section>

    <script>
        // --- PREMIUM JAVASCRIPT LOGIC ---
        document.addEventListener('DOMContentLoaded', () => {
            const screens = {
                loading: document.getElementById('loading-screen'),
                intro: document.getElementById('intro-screen'),
                envelope: document.getElementById('envelope-screen'),
                letter: document.getElementById('letter-screen'),
                proposal: document.getElementById('proposal-screen'),
                celebration: document.getElementById('celebration-screen')
            };

            const bgMusic = document.getElementById('bg-music');
            const startHeart = document.getElementById('start-heart');
            const envelope = document.getElementById('envelope');
            const envelopeWrapper = document.querySelector('.envelope-wrapper');
            const typewriterContainer = document.getElementById('typewriter-text');
            const btnContinue = document.getElementById('btn-continue');
            const btnYes = document.getElementById('btn-yes');
            const btnNo = document.getElementById('btn-no');

            const letterLines = [
                "Dear Sona ❤️",
                "Shayad ye meri zindagi ka sabse khaas message hai...",
                "Jab se tum meri zindagi me aayi ho,",
                "har din pehle se bhi khoobsurat lagne laga hai.",
                "Tumhari smile meri duniya roshan kar deti hai.",
                "Main perfect nahi hoon,",
                "lekin ek baat ka wada karta hoon...",
                "Main hamesha tumhari respect karunga,",
                "tumhara saath dunga,",
                "aur har mushkil me tumhare saath khada rahunga.",
                "Sona...",
                "Kya tum meri humsafar banogi? ❤️"
            ];

            function switchScreen(fromScreen, toScreen, delay = 0) {
                setTimeout(() => {
                    fromScreen.classList.remove('active');
                    fromScreen.classList.add('hidden');
                    setTimeout(() => {
                        toScreen.classList.remove('hidden');
                        toScreen.classList.add('active');
                    }, 800);
                }, delay);
            }

            setTimeout(() => {
                switchScreen(screens.loading, screens.intro);
                createParticles();
            }, 2500);

            startHeart.addEventListener('click', () => {
                bgMusic.volume = 0.5;
                bgMusic.play().catch(e => console.log("Audio playing."));
                switchScreen(screens.intro, screens.envelope);
            });

            envelopeWrapper.addEventListener('click', function envelopeClick() {
                envelopeWrapper.removeEventListener('click', envelopeClick);
                envelope.classList.add('open');
                switchScreen(screens.envelope, screens.letter, 2000);
                
                setTimeout(() => {
                    typeWriterEffect(letterLines, typewriterContainer, () => {
                        btnContinue.classList.remove('hidden');
                        btnContinue.style.display = 'inline-block';
                        btnContinue.style.animation = 'fade-up 1s forwards';
                    });
                }, 3000);
            });

            function typeWriterEffect(lines, container, callback) {
                container.innerHTML = '';
                let lineIndex = 0; let charIndex = 0;
                const cursor = document.createElement('span');
                cursor.className = 'cursor';

                function type() {
                    if (lineIndex < lines.length) {
                        if (charIndex === 0) {
                            const p = document.createElement('p');
                            container.appendChild(p);
                            container.appendChild(cursor);
                        }
                        const currentLine = lines[lineIndex];
                        const paragraphs = container.querySelectorAll('p');
                        const currentP = paragraphs[paragraphs.length - 1];

                        if (charIndex < currentLine.length) {
                            currentP.innerHTML += currentLine.charAt(charIndex);
                            charIndex++;
                            let speed = Math.random() * 50 + 30;
                            if (currentLine.charAt(charIndex - 1) === ',' || currentLine.charAt(charIndex - 1) === '.') speed += 300;
                            setTimeout(type, speed);
                        } else {
                            lineIndex++; charIndex = 0;
                            setTimeout(type, 800);
                        }
                    } else {
                        cursor.remove();
                        if(callback) callback();
                    }
                }
                type();
            }

            btnContinue.addEventListener('click', () => {
                switchScreen(screens.letter, screens.proposal);
            });

            const moveNoButton = () => {
                const x = Math.random() * (window.innerWidth - btnNo.offsetWidth - 40) - (window.innerWidth/2) + btnNo.offsetWidth/2;
                const y = Math.random() * (window.innerHeight - btnNo.offsetHeight - 40) - (window.innerHeight/2) + btnNo.offsetHeight/2;
                btnNo.style.position = 'absolute';
                btnNo.style.transform = `translate(${x}px, ${y}px)`;
            };

            btnNo.addEventListener('mouseover', moveNoButton);
            btnNo.addEventListener('touchstart', (e) => { e.preventDefault(); moveNoButton(); });

            btnYes.addEventListener('click', () => {
                switchScreen(screens.proposal, screens.celebration);
                bgMusic.volume = 0.9;
                setTimeout(() => { startFireworks(); createExplosionHearts(); }, 1000);
            });

            const particleContainer = document.getElementById('particle-container');
            function createParticles() {
                for(let i=0; i<30; i++) createSingleParticle('firefly');
                setInterval(() => { createSingleParticle('heart'); }, 2000);
            }

            function createSingleParticle(type) {
                const el = document.createElement('div');
                if (type === 'firefly') {
                    el.className = 'particle';
                    const size = Math.random() * 3 + 1;
                    el.style.width = `${size}px`; el.style.height = `${size}px`;
                    el.style.background = 'rgba(255, 215, 0, 0.6)';
                    el.style.boxShadow = `0 0 ${size*2}px rgba(255, 215, 0, 0.8)`;
                } else {
                    el.className = 'particle-heart'; el.innerHTML = '❤️';
                    el.style.fontSize = `${Math.random() * 15 + 10}px`;
                }
                el.style.left = `${Math.random() * 100}vw`;
                const duration = Math.random() * 10 + 10;
                el.style.animationDuration = `${duration}s`;
                particleContainer.appendChild(el);
                setTimeout(() => { el.remove(); createSingleParticle(type); }, (duration + 5) * 1000);
            }

            function createExplosionHearts() {
                for(let i = 0; i < 50; i++) {
                    setTimeout(() => {
                        const el = document.createElement('div');
                        el.className = 'particle-heart';
                        el.innerHTML = ['❤️', '💖', '✨'][Math.floor(Math.random()*3)];
                        el.style.left = '50%'; el.style.top = '50%';
                        const angle = Math.random() * Math.PI * 2;
                        const velocity
